name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dtransfert
          POSTGRES_PASSWORD: dtransfert
          POSTGRES_DB: dtransfert_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U dtransfert"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check for Alembic drift (models vs. migrations)
        env:
          DATABASE_URL: postgresql+asyncpg://dtransfert:dtransfert@localhost:55432/dtransfert_test
        run: |
          alembic upgrade head
          alembic check
          alembic downgrade base

      - name: Run test suite
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
